<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修行手帳 - 一日ルーティン</title>
<style>
  :root{
    --paper:#EFEAE0;
    --paper-card:#F7F4EC;
    --ink:#1C1B1A;
    --ink-soft:#5B5750;
    --stamp:#C43428;
    --stamp-soft:#E7B9B3;
    --gold:#B98B2E;
    --line:#D8D2C4;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:520px;
    margin:0 auto;
    padding:28px 18px 60px;
  }
  .header{
    text-align:center;
    margin-bottom:6px;
  }
  .header .eyebrow{
    font-size:12px;
    letter-spacing:0.3em;
    color:var(--ink-soft);
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
  }
  .header h1{
    font-size:26px;
    font-weight:normal;
    margin:6px 0 2px;
    letter-spacing:0.05em;
  }
  .header .date{
    font-size:13px;
    color:var(--ink-soft);
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
  }
  .divider{
    border:none;
    border-top:1px dashed var(--line);
    margin:18px 0 20px;
  }
  .kakugen{
    text-align:center;
    margin:20px 0 4px;
    padding:18px 16px;
    background:var(--paper-card);
    border-top:1px solid var(--gold);
    border-bottom:1px solid var(--gold);
    cursor:pointer;
  }
  .kakugen .kakugen-text{
    font-size:18px;
    letter-spacing:0.08em;
    line-height:1.7;
  }
  .kakugen .kakugen-source{
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
    font-size:10px;
    color:var(--ink-soft);
    letter-spacing:0.2em;
    margin-top:8px;
  }
  .scold{
    display:none;
    margin:16px 0 4px;
    padding:16px;
    background:#3A1310;
    border-left:4px solid var(--stamp);
    color:#F2DDD9;
  }
  .scold.active{ display:block; }
  .scold .scold-text{
    font-size:16px;
    line-height:1.8;
    letter-spacing:0.05em;
  }
  .scold .scold-detail{
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
    font-size:11px;
    color:var(--stamp-soft);
    margin-top:10px;
  }
  .home-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:4px;
    padding:10px 14px;
    margin-bottom:22px;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
  }
  .home-row label{
    font-size:13px;
    color:var(--ink-soft);
  }
  .home-row input[type=time]{
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
    font-size:15px;
    border:1px solid var(--line);
    background:#fff;
    border-radius:3px;
    padding:4px 6px;
    color:var(--ink);
  }
  .section-title{
    font-size:12px;
    color:var(--ink-soft);
    letter-spacing:0.2em;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
    margin:22px 0 8px 2px;
  }
  .block{
    position:relative;
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding:12px 10px 12px 4px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    transition:background 0.15s;
  }
  .block:hover{ background:rgba(0,0,0,0.02); }
  .block.now{
    border-left:3px solid var(--stamp);
    padding-left:8px;
    background:rgba(196,52,40,0.05);
  }
  .block.marker{ cursor:default; }
  .stamp-circle{
    flex:none;
    width:34px;
    height:34px;
    border-radius:50%;
    border:2px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    color:transparent;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
    margin-top:2px;
  }
  .stamp-circle.checked{
    border-color:var(--stamp);
    color:var(--stamp);
    transform:rotate(-8deg);
    font-weight:bold;
  }
  .stamp-circle.marker{
    border:none;
    font-size:10px;
    color:var(--gold);
  }
  .block-main{ flex:1; }
  .block-time{
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:0.03em;
  }
  .block-label{
    font-size:16px;
    margin-top:2px;
  }
  .block-note{
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
    font-size:11px;
    color:var(--gold);
    margin-top:3px;
  }
  .block-memo{
    display:block;
    width:100%;
    margin-top:8px;
    padding:6px 8px;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
    font-size:13px;
    color:var(--ink);
    background:#fff;
    border:1px solid var(--line);
    border-radius:3px;
    resize:vertical;
    line-height:1.6;
  }
  .block-memo::placeholder{
    color:var(--ink-soft);
    opacity:0.6;
  }
  .footer{
    margin-top:26px;
    text-align:center;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
  }
  .stamp-count{
    display:inline-block;
    border:1px solid var(--gold);
    color:var(--gold);
    border-radius:20px;
    padding:6px 18px;
    font-size:13px;
  }
  .reset-link{
    display:block;
    margin-top:14px;
    font-size:11px;
    color:var(--ink-soft);
    text-decoration:underline;
    background:none;
    border:none;
    cursor:pointer;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
  }
  .tabs{
    display:flex;
    gap:8px;
    margin-top:18px;
  }
  .tab{
    flex:1;
    padding:9px 0;
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:4px;
    font-size:13px;
    letter-spacing:0.2em;
    color:var(--ink-soft);
    cursor:pointer;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
  }
  .tab.active{
    border-color:var(--stamp);
    color:var(--stamp);
    font-weight:bold;
  }
  .today-progress{
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:10px;
  }
  .cal-stats{
    display:flex;
    gap:8px;
    margin-top:20px;
  }
  .cal-stat{
    flex:1;
    text-align:center;
    padding:12px 4px 10px;
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:4px;
  }
  .cal-stat .v{
    font-size:22px;
    color:var(--stamp);
  }
  .cal-stat .k{
    font-size:10px;
    color:var(--ink-soft);
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
    letter-spacing:0.15em;
    margin-top:4px;
  }
  .cal-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:22px 0 10px;
  }
  .cal-title{
    font-size:16px;
    letter-spacing:0.1em;
  }
  .cal-nav-btn{
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:4px;
    padding:6px 14px;
    cursor:pointer;
    color:var(--ink-soft);
    font-size:12px;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
  }
  .cal-dow{
    text-align:center;
    font-size:10px;
    color:var(--ink-soft);
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
    padding:2px 0 6px;
  }
  .cal-day{
    aspect-ratio:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    border:1px solid transparent;
    border-radius:4px;
    cursor:pointer;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
  }
  .cal-day .num{ font-size:11px; color:var(--ink-soft); }
  .cal-day .mark{
    font-size:12px;
    height:20px;
    line-height:20px;
    color:transparent;
  }
  .cal-day.done .mark{
    color:var(--stamp);
    border:1.5px solid var(--stamp);
    border-radius:50%;
    width:20px;
    font-size:10px;
    line-height:17px;
    text-align:center;
    transform:rotate(-8deg);
    font-weight:bold;
  }
  .cal-day.partial .mark{ color:var(--gold); }
  .cal-day.today{ border-color:var(--gold); background:var(--paper-card); }
  .cal-day.future{ opacity:0.35; cursor:default; }
  .cal-day.empty{ cursor:default; }
  .cal-day.selected{ border-color:var(--stamp); background:rgba(196,52,40,0.06); }
  .cal-detail{
    margin-top:16px;
    padding:14px 16px;
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:4px;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
  }
  .cal-detail-title{ font-size:14px; margin-bottom:6px; }
  .cal-detail-status{ font-size:13px; color:var(--ink-soft); }
  .cal-detail-status.ok{ color:var(--stamp); }
  .cal-detail-row{ font-size:11px; color:var(--ink-soft); margin-top:8px; line-height:1.7; }
  .cal-detail-memo{
    font-size:12px;
    margin-top:10px;
    padding-top:10px;
    border-top:1px dashed var(--line);
    line-height:1.7;
  }
  .block.draggable{
    padding-right:36px;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
  }
  .drag-handle{
    position:absolute;
    right:4px;
    top:50%;
    transform:translateY(-50%);
    color:var(--line);
    font-size:15px;
    padding:8px 6px;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
  }
  .block.dragging{
    opacity:0.35;
    background:rgba(196,52,40,0.06);
  }
  .block-ghost{
    position:fixed;
    z-index:99;
    pointer-events:none;
    background:var(--paper-card);
    box-shadow:0 6px 18px rgba(0,0,0,0.18);
    border:1px solid var(--gold);
    border-radius:4px;
    opacity:0.95;
  }
  body.drag-active{
    user-select:none;
    -webkit-user-select:none;
  }
  .block-time.editable{ cursor:pointer; }
  .dur-pen{
    color:var(--gold);
    margin-left:6px;
  }
  .dur-editor{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-left:6px;
  }
  .dur-btn{
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:4px;
    padding:4px 10px;
    font-size:12px;
    color:var(--ink);
    cursor:pointer;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif;
  }
  .dur-btn.ok{
    border-color:var(--stamp);
    color:var(--stamp);
  }
  .dur-val{
    font-size:13px;
    color:var(--stamp);
    min-width:44px;
    text-align:center;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="eyebrow">FUKUOKA APPRENTICESHIP LOG</div>
    <h1>修行手帳</h1>
    <div class="date" id="today-label"></div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-today">今日</button>
    <button class="tab" id="tab-calendar">振り返り</button>
  </div>

  <div id="view-today">
  <div class="kakugen" id="kakugen" title="タップで次の格言">
    <div class="kakugen-text" id="kakugen-text"></div>
    <div class="kakugen-source">RUCCOLO'S WORDS</div>
  </div>

  <div class="scold" id="scold">
    <div class="scold-text" id="scold-text"></div>
    <div class="scold-detail" id="scold-detail"></div>
  </div>

  <hr class="divider">

  <div class="home-row">
    <label for="home-time">帰宅時刻</label>
    <input type="time" id="home-time" value="17:00">
  </div>

  <div class="section-title">午前 - 自由時間</div>
  <div id="morning-blocks"></div>

  <div class="section-title">日中 - ルッコローからのインプット</div>
  <div id="midday-blocks"></div>

  <div class="section-title">夕方〜夜 - 自由時間</div>
  <div id="evening-blocks"></div>

  <div class="footer">
    <div class="today-progress" id="today-progress"></div>
    <span class="stamp-count" id="stamp-count">達成日数: -</span>
    <button class="reset-link" id="reset-today">今日のチェックをリセット</button>
  </div>
  </div>

  <div id="view-calendar" style="display:none">
    <div class="cal-stats">
      <div class="cal-stat"><div class="v" id="stat-streak">-</div><div class="k">連続達成</div></div>
      <div class="cal-stat"><div class="v" id="stat-month">-</div><div class="k">今月の達成</div></div>
      <div class="cal-stat"><div class="v" id="stat-total">-</div><div class="k">総達成日数</div></div>
    </div>
    <div class="cal-nav">
      <button class="cal-nav-btn" id="cal-prev">◀ 前月</button>
      <div class="cal-title" id="cal-title"></div>
      <button class="cal-nav-btn" id="cal-next">翌月 ▶</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-detail" id="cal-detail" style="display:none"></div>
  </div>
</div>

<script>
const KAKUGEN = [
  "準備がすべて",
  "相手視点で考える",
  "本質で考える",
  "価値を上げる",
  "他人の人生を勝手に背負う",
  "一挙手一投足に意識を通す",
  "どれだけ楽しい時間を作れるか",
  "ものを売るのではなく、必要な人に必要なモノを「届ける」"
];
let kakugenIndex = Math.floor(Math.random() * KAKUGEN.length);
function showKakugen(){
  document.getElementById("kakugen-text").textContent = KAKUGEN[kakugenIndex];
}

const SCOLD = [
  "今、変わろうとしなかったら一生変われないよ？",
  "今自分のすべての弱みに直面している。そのままでいい要素はほぼない。",
  "こんな状況でもまだ逃げ続けるのか？",
  "自分の一挙手一投足を疑え。今のままで変われると思うなよ。",
  "周りの人にしてもらっていることを考えろ。",
  "今のお前はただの邪魔だ。",
  "早く成功して、周りに恩返しできるようにやるべきことをやるしかない。"
];

const store = {
  async get(k){
    if(window.storage){
      try{ const r = await window.storage.get(k); return r ? r.value : null; }
      catch(e){ return null; }
    }
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  },
  async set(k,v){
    if(window.storage){
      try{ await window.storage.set(k,v); return; }catch(e){}
    }
    try{ localStorage.setItem(k,v); }catch(e){}
  }
};

const WAKE = {id:"wake", start:"06:00", end:"06:00", label:"起床", marker:true};
const SLEEP = {id:"sleep", start:"23:00", end:"23:00", label:"就寝", marker:true};
const MORNING_ITEMS = [
  {id:"run", dur:20, label:"ランニング"},
  {id:"train", dur:10, label:"筋トレ"},
  {id:"shower_am", dur:30, label:"シャワー・身支度"},
  {id:"sim", dur:120, label:"経営者対話シミュレーション"}
];
const EVENING_ITEMS = [
  {id:"meal", dur:90, label:"食事・シャワー"},
  {id:"photo", dur:30, label:"写真・動画の振り返り"},
  {id:"migite", dur:60, label:"おじさんの右腕"},
  {id:"projects", dur:60, label:"BRÜCKE / SPECK / にくだ"}
];
const FIXED_MIDDAY = [
  {id:"input", start:"09:00", end:"17:00", label:"ルッコローからのインプット", note:"店舗視察 → 自分の売上仮説をぶつける"}
];

function orderedItems(items, orderIds){
  if(!orderIds) return items;
  const map = {};
  items.forEach(i => map[i.id] = i);
  const out = orderIds.map(id => map[id]).filter(Boolean);
  items.forEach(i => { if(out.indexOf(i) < 0) out.push(i); });
  return out;
}
function durOf(id, fallback){
  const v = state.durs && state.durs[id];
  return (typeof v === "number" && v >= 5) ? v : fallback;
}
function chainItems(items, startMin, group){
  let t = startMin;
  return items.map(i => {
    const dur = durOf(i.id, i.dur);
    const b = {id:i.id, label:i.label, start:toHHMM(t), end:toHHMM(t + dur), group:group, dur:dur, durEditable:true};
    if(i.note) b.note = i.note;
    t += dur;
    return b;
  });
}
function buildMorningBlocks(){
  const items = orderedItems(MORNING_ITEMS, state.order && state.order.morning);
  return [WAKE].concat(chainItems(items, 6*60, "morning"));
}

function toMin(hhmm){
  const [h,m] = hhmm.split(":").map(Number);
  return h*60+m;
}
function toHHMM(min){
  min = ((min%1440)+1440)%1440;
  const h = Math.floor(min/60), m = min%60;
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
}
function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function nowMin(){
  const d = new Date();
  return d.getHours()*60+d.getMinutes();
}

function buildEveningBlocks(homeTime){
  const home = toMin(homeTime);
  const reflectDur = durOf("reflect", 90);
  const reflectEnd = home + reflectDur;
  const mealStart = toMin("18:30");
  const blocks = [
    {id:"reflect", start:homeTime, end:toHHMM(reflectEnd), label:"その日の学びの振り返り", dur:reflectDur, durEditable:true}
  ];
  if(reflectEnd < mealStart){
    blocks.push({id:"free", start:toHHMM(reflectEnd), end:"18:30", label:"映画鑑賞・その他インプット・おじさんの右腕", note:"余白時間", memo:true});
  }
  const tail = orderedItems(EVENING_ITEMS, state.order && state.order.evening);
  return blocks.concat(chainItems(tail, toMin("18:30"), "evening")).concat([SLEEP]);
}

let state = { homeTime:"17:00", checked:{}, memos:{}, order:{}, durs:{} };

async function loadState(){
  const raw = await store.get("routine:"+todayStr());
  if(raw){
    try{
      const parsed = JSON.parse(raw);
      state.homeTime = parsed.homeTime || "17:00";
      state.checked = parsed.checked || {};
      state.memos = parsed.memos || {};
      state.order = parsed.order || {};
      state.durs = parsed.durs || {};
    }catch(e){}
  }
}
async function saveState(){
  await store.set("routine:"+todayStr(), JSON.stringify(state));
  checkCompletion();
}
async function checkCompletion(){
  const allBlocks = [...buildMorningBlocks(), ...FIXED_MIDDAY, ...buildEveningBlocks(state.homeTime)]
    .filter(b => !b.marker);
  const allChecked = allBlocks.every(b => state.checked[b.id]);
  let dates = [];
  const raw = await store.get("completed-dates");
  if(raw){ try{ dates = JSON.parse(raw); }catch(e){} }
  const t = todayStr();
  const has = dates.includes(t);
  if(allChecked && !has){
    dates.push(t);
    await store.set("completed-dates", JSON.stringify(dates));
  } else if(!allChecked && has){
    dates = dates.filter(d => d !== t);
    await store.set("completed-dates", JSON.stringify(dates));
  }
  document.getElementById("stamp-count").textContent = "達成日数: " + dates.length;
}

function renderGroup(containerId, blocks){
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  const now = nowMin();
  blocks.forEach(b => {
    const row = document.createElement("div");
    const isNow = !b.marker && now >= toMin(b.start) && now < toMin(b.end===b.start ? toHHMM(toMin(b.end)+1) : b.end);
    row.className = "block" + (isNow ? " now" : "") + (b.marker ? " marker" : "");
    const circle = document.createElement("div");
    circle.className = "stamp-circle" + (b.marker ? " marker" : "") + (state.checked[b.id] ? " checked" : "");
    circle.textContent = b.marker ? "・" : (state.checked[b.id] ? "済" : "");
    const main = document.createElement("div");
    main.className = "block-main";
    const time = document.createElement("div");
    time.className = "block-time";
    time.textContent = b.start === b.end ? b.start : (b.start + " - " + b.end);
    if(b.durEditable){
      time.classList.add("editable");
      if(editingDurId === b.id){
        const ed = document.createElement("span");
        ed.className = "dur-editor";
        const mkBtn = (txt, cls, fn) => {
          const btn = document.createElement("button");
          btn.className = "dur-btn" + (cls ? " " + cls : "");
          btn.textContent = txt;
          btn.addEventListener("click", (e) => { e.stopPropagation(); fn(); });
          return btn;
        };
        const val = document.createElement("span");
        val.className = "dur-val";
        val.textContent = b.dur + "分";
        ed.appendChild(mkBtn("−5", "", () => setDur(b.id, b.dur - 5)));
        ed.appendChild(val);
        ed.appendChild(mkBtn("＋5", "", () => setDur(b.id, b.dur + 5)));
        ed.appendChild(mkBtn("完了", "ok", () => { editingDurId = null; renderAll(); }));
        time.appendChild(ed);
      } else {
        const pen = document.createElement("span");
        pen.className = "dur-pen";
        pen.textContent = "✎ " + b.dur + "分";
        time.appendChild(pen);
        time.addEventListener("click", (e) => {
          e.stopPropagation();
          if(suppressClick) return;
          editingDurId = b.id;
          renderAll();
        });
      }
    }
    const label = document.createElement("div");
    label.className = "block-label";
    label.textContent = b.label;
    main.appendChild(time);
    main.appendChild(label);
    if(b.note){
      const note = document.createElement("div");
      note.className = "block-note";
      note.textContent = b.note;
      main.appendChild(note);
    }
    if(b.memo){
      const memo = document.createElement("textarea");
      memo.className = "block-memo";
      memo.rows = 2;
      memo.placeholder = "実際にやったことをメモ";
      memo.value = state.memos[b.id] || "";
      memo.addEventListener("click", e => e.stopPropagation());
      memo.addEventListener("input", async (e) => {
        state.memos[b.id] = e.target.value;
        await saveState();
      });
      main.appendChild(memo);
    }
    row.appendChild(circle);
    row.appendChild(main);
    if(!b.marker){
      row.addEventListener("click", async () => {
        if(suppressClick) return;
        state.checked[b.id] = !state.checked[b.id];
        await saveState();
        renderAll();
      });
    }
    if(b.group){
      row.dataset.id = b.id;
      attachDrag(row, b, container);
    }
    container.appendChild(row);
  });
}

/* ---- 所要時間の変更 ---- */
let editingDurId = null;

async function setDur(id, min){
  min = Math.max(5, Math.min(480, min));
  state.durs[id] = min;
  await saveState();
  renderAll();
}

/* ---- 並び替え(PC: ドラッグ / スマホ: 長押し) ---- */
let suppressClick = false;
let drag = null;

function startDrag(row, b, container, y){
  const rect = row.getBoundingClientRect();
  const ghost = row.cloneNode(true);
  ghost.className = "block block-ghost";
  ghost.style.width = rect.width + "px";
  ghost.style.left = rect.left + "px";
  ghost.style.top = rect.top + "px";
  document.body.appendChild(ghost);
  document.body.classList.add("drag-active");
  row.classList.add("dragging");
  drag = {row:row, group:b.group, container:container, ghost:ghost, offsetY:y - rect.top};
  if(navigator.vibrate){ try{ navigator.vibrate(30); }catch(e){} }
}

function onDragMove(y){
  if(!drag) return;
  drag.ghost.style.top = (y - drag.offsetY) + "px";
  const rows = [...drag.container.querySelectorAll(".block.draggable")].filter(r => r !== drag.row);
  let target = null;
  for(const r of rows){
    const rc = r.getBoundingClientRect();
    if(y < rc.top + rc.height / 2){ target = r; break; }
  }
  if(target){
    if(target !== drag.row.nextSibling) drag.container.insertBefore(drag.row, target);
  } else if(rows.length){
    const last = rows[rows.length - 1];
    if(drag.row !== last.nextSibling && drag.row !== last) drag.container.insertBefore(drag.row, last.nextSibling);
  }
}

async function endDrag(){
  if(!drag) return;
  const ids = [...drag.container.querySelectorAll(".block.draggable")].map(r => r.dataset.id);
  const group = drag.group;
  drag.ghost.remove();
  drag.row.classList.remove("dragging");
  document.body.classList.remove("drag-active");
  drag = null;
  suppressClick = true;
  setTimeout(() => { suppressClick = false; }, 150);
  state.order[group] = ids;
  await saveState();
  renderAll();
}

function attachDrag(row, b, container){
  row.classList.add("draggable");
  const handle = document.createElement("div");
  handle.className = "drag-handle";
  handle.textContent = "≡";
  row.appendChild(handle);

  row.addEventListener("mousedown", (e) => {
    if(e.button !== 0 || e.target.tagName === "TEXTAREA") return;
    const sx = e.clientX, sy = e.clientY;
    let started = false;
    const move = (ev) => {
      if(!started && Math.abs(ev.clientX - sx) + Math.abs(ev.clientY - sy) > 6){
        started = true;
        startDrag(row, b, container, ev.clientY);
      }
      if(started) onDragMove(ev.clientY);
    };
    const up = () => {
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", up);
      if(started) endDrag();
    };
    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", up);
  });

  row.addEventListener("touchstart", (e) => {
    if(e.target.tagName === "TEXTAREA") return;
    const t0 = e.touches[0];
    const sx = t0.clientX, sy = t0.clientY;
    let started = false;
    const timer = setTimeout(() => {
      started = true;
      startDrag(row, b, container, sy);
    }, 400);
    const move = (ev) => {
      const t = ev.touches[0];
      if(!started){
        if(Math.abs(t.clientX - sx) + Math.abs(t.clientY - sy) > 10){
          clearTimeout(timer);
          cleanup();
        }
        return;
      }
      ev.preventDefault();
      onDragMove(t.clientY);
    };
    const end = () => {
      clearTimeout(timer);
      cleanup();
      if(started) endDrag();
    };
    const cleanup = () => {
      row.removeEventListener("touchmove", move);
      row.removeEventListener("touchend", end);
      row.removeEventListener("touchcancel", end);
    };
    row.addEventListener("touchmove", move, {passive:false});
    row.addEventListener("touchend", end);
    row.addEventListener("touchcancel", end);
  }, {passive:true});
}

function updateScold(){
  const now = nowMin();
  const allBlocks = [...buildMorningBlocks(), ...FIXED_MIDDAY, ...buildEveningBlocks(state.homeTime)]
    .filter(b => !b.marker);
  const overdue = allBlocks.filter(b => toMin(b.end) <= now && !state.checked[b.id]);
  const el = document.getElementById("scold");
  if(overdue.length > 0){
    el.classList.add("active");
    document.getElementById("scold-text").textContent =
      SCOLD[Math.floor(Math.random() * SCOLD.length)];
    document.getElementById("scold-detail").textContent =
      "未消化: " + overdue.map(b => b.label).join(" / ");
  } else {
    el.classList.remove("active");
  }
}

function updateProgress(){
  const allBlocks = [...buildMorningBlocks(), ...FIXED_MIDDAY, ...buildEveningBlocks(state.homeTime)]
    .filter(b => !b.marker);
  const done = allBlocks.filter(b => state.checked[b.id]).length;
  document.getElementById("today-progress").textContent = "本日の消化: " + done + " / " + allBlocks.length;
}

function renderAll(){
  renderGroup("morning-blocks", buildMorningBlocks());
  renderGroup("midday-blocks", FIXED_MIDDAY);
  renderGroup("evening-blocks", buildEveningBlocks(state.homeTime));
  updateScold();
  updateProgress();
}

/* ---- 振り返りカレンダー ---- */
const calInit = new Date();
let calYear = calInit.getFullYear();
let calMonth = calInit.getMonth();
let calSelected = null;

function getDayData(dateStr){
  let raw = null;
  try{ raw = localStorage.getItem("routine:"+dateStr); }catch(e){}
  if(!raw) return null;
  try{ return JSON.parse(raw); }catch(e){ return null; }
}
function blocksForDay(data){
  const homeTime = (data && data.homeTime) || "17:00";
  return [...buildMorningBlocks(), ...FIXED_MIDDAY, ...buildEveningBlocks(homeTime)]
    .filter(b => !b.marker);
}
function dateStrOf(y, m, d){
  return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
}
async function getCompletedDates(){
  const raw = await store.get("completed-dates");
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return [];
}
function calcStreak(set){
  let streak = 0;
  const d = new Date();
  if(!set.has(todayStr())) d.setDate(d.getDate()-1);
  while(true){
    const s = dateStrOf(d.getFullYear(), d.getMonth(), d.getDate());
    if(set.has(s)){ streak++; d.setDate(d.getDate()-1); } else break;
  }
  return streak;
}

function renderCalDetail(ds, set){
  const el = document.getElementById("cal-detail");
  el.style.display = "block";
  el.innerHTML = "";
  const data = getDayData(ds);
  const [y, mo, d] = ds.split("-").map(Number);
  const dow = ["日","月","火","水","木","金","土"][new Date(y, mo-1, d).getDay()];
  const title = document.createElement("div");
  title.className = "cal-detail-title";
  title.textContent = mo+"月"+d+"日("+dow+")";
  el.appendChild(title);
  const status = document.createElement("div");
  status.className = "cal-detail-status";
  if(!data && !set.has(ds)){
    status.textContent = "記録なし";
    el.appendChild(status);
    return;
  }
  const blocks = blocksForDay(data);
  const checked = (data && data.checked) || {};
  const done = blocks.filter(b => checked[b.id]);
  const undone = blocks.filter(b => !checked[b.id]);
  if(set.has(ds)){
    status.textContent = "全ブロック達成（" + blocks.length + " / " + blocks.length + "）";
    status.classList.add("ok");
  } else {
    status.textContent = "消化 " + done.length + " / " + blocks.length;
  }
  el.appendChild(status);
  if(!set.has(ds) && undone.length > 0){
    const u = document.createElement("div");
    u.className = "cal-detail-row";
    u.textContent = "未消化: " + undone.map(b => b.label).join(" / ");
    el.appendChild(u);
  }
  const memoText = data && data.memos && data.memos.free;
  if(memoText){
    const m2 = document.createElement("div");
    m2.className = "cal-detail-memo";
    m2.textContent = "余白メモ: " + memoText;
    el.appendChild(m2);
  }
}

async function renderCalendar(){
  const dates = await getCompletedDates();
  const set = new Set(dates);
  const now = new Date();
  const nowPrefix = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  document.getElementById("stat-total").textContent = dates.length;
  document.getElementById("stat-streak").textContent = calcStreak(set);
  document.getElementById("stat-month").textContent = dates.filter(s => s.startsWith(nowPrefix)).length;
  document.getElementById("cal-title").textContent = calYear+"年"+(calMonth+1)+"月";

  const grid = document.getElementById("cal-grid");
  grid.innerHTML = "";
  ["日","月","火","水","木","金","土"].forEach(w => {
    const el = document.createElement("div");
    el.className = "cal-dow";
    el.textContent = w;
    grid.appendChild(el);
  });
  const startDow = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const today = todayStr();
  for(let i = 0; i < startDow; i++){
    const el = document.createElement("div");
    el.className = "cal-day empty";
    grid.appendChild(el);
  }
  for(let d = 1; d <= daysInMonth; d++){
    const ds = dateStrOf(calYear, calMonth, d);
    const data = getDayData(ds);
    const hasPartial = data && data.checked && Object.values(data.checked).some(v => v);
    const el = document.createElement("div");
    let cls = "cal-day";
    if(set.has(ds)) cls += " done";
    else if(hasPartial) cls += " partial";
    if(ds === today) cls += " today";
    if(ds > today) cls += " future";
    if(calSelected === ds) cls += " selected";
    el.className = cls;
    const num = document.createElement("div");
    num.className = "num";
    num.textContent = d;
    el.appendChild(num);
    const mark = document.createElement("div");
    mark.className = "mark";
    mark.textContent = set.has(ds) ? "済" : (hasPartial ? "・" : "");
    el.appendChild(mark);
    if(ds <= today){
      el.addEventListener("click", () => {
        calSelected = ds;
        renderCalendar();
      });
    }
    grid.appendChild(el);
  }
  if(calSelected) renderCalDetail(calSelected, set);
}

function switchTab(tab){
  document.getElementById("view-today").style.display = tab === "today" ? "" : "none";
  document.getElementById("view-calendar").style.display = tab === "calendar" ? "" : "none";
  document.getElementById("tab-today").classList.toggle("active", tab === "today");
  document.getElementById("tab-calendar").classList.toggle("active", tab === "calendar");
  if(tab === "calendar"){
    if(!calSelected) calSelected = todayStr();
    renderCalendar();
  }
}

async function init(){
  const d = new Date();
  document.getElementById("today-label").textContent =
    d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";

  showKakugen();
  document.getElementById("kakugen").addEventListener("click", () => {
    kakugenIndex = (kakugenIndex + 1) % KAKUGEN.length;
    showKakugen();
  });

  await loadState();
  document.getElementById("home-time").value = state.homeTime;

  document.getElementById("home-time").addEventListener("change", async (e) => {
    state.homeTime = e.target.value;
    await saveState();
    renderAll();
  });

  document.getElementById("reset-today").addEventListener("click", async () => {
    state.checked = {};
    await saveState();
    renderAll();
  });

  document.getElementById("tab-today").addEventListener("click", () => switchTab("today"));
  document.getElementById("tab-calendar").addEventListener("click", () => switchTab("calendar"));
  document.getElementById("cal-prev").addEventListener("click", () => {
    calMonth--;
    if(calMonth < 0){ calMonth = 11; calYear--; }
    renderCalendar();
  });
  document.getElementById("cal-next").addEventListener("click", () => {
    calMonth++;
    if(calMonth > 11){ calMonth = 0; calYear++; }
    renderCalendar();
  });

  renderAll();
  await checkCompletion();

  setInterval(() => {
    if(document.activeElement && document.activeElement.classList.contains("block-memo")) return;
    renderAll();
  }, 30000);
}

init();
</script>
